name: CI/CD Dev → Test → Prod (Simulado)

on:
  workflow_dispatch:
    inputs:
      fail_fase3:
        description: "Simular error en la Fase 3 (en Test)"
        required: true
        default: "false"

permissions:
  contents: read
  issues: write

jobs:
  dev:
    name: Stage DEV
    runs-on: ubuntu-latest
    steps:
      - name: Fase 1 - Inicialización
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"
          echo "✅ [DEV] Fase 1 - Inicialización completada en ${t}s"

      - name: Fase 2 - Carga de datos
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"
          echo "✅ [DEV] Fase 2 - Carga de datos completada en ${t}s"

  test:
    name: Stage TEST
    runs-on: ubuntu-latest
    needs: [dev]
    steps:
      - name: Fase 3 - Procesamiento (con fallo opcional)
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"

          if [ "${{ inputs.fail_fase3 }}" = "true" ]; then
            echo "❌ [TEST] Fase 3 falló intencionalmente (simulación) luego de ${t}s"
            exit 1
          fi

          echo "✅ [TEST] Fase 3 - Procesamiento completada en ${t}s"

      - name: Fase 4 - Validación
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"
          echo "✅ [TEST] Fase 4 - Validación completada en ${t}s"

  prod:
    name: Stage PROD
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Fase 5 - Deploy / Finalización
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"
          echo "✅ [PROD] Fase 5 - Deploy/Finalización completada en ${t}s"

  notify_failure_issue:
    name: Notificar fallo (Issue)
    runs-on: ubuntu-latest
    needs: [dev, test, prod]
    if: always() && contains(join(needs.*.result, ','), 'failure')
    steps:
      - name: Crear Issue de fallo
        uses: actions/github-script@v7
        with:
          script: |
            const title = `❌ CI/CD falló (run #${context.runNumber})`;
            const body = [
              `Ocurrió un **ERROR** en el pipeline Dev → Test → Prod.`,
              ``,
              `**Repo:** ${context.repo.owner}/${context.repo.repo}`,
              `**Workflow:** ${context.workflow}`,
              `**Run:** #${context.runNumber}`,
              `**URL:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `**Resultados por stage:**`,
              `- DEV:  ${{ needs.dev.result }}`,
              `- TEST: ${{ needs.test.result }}`,
              `- PROD: ${{ needs.prod.result }}`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'failure']
            });

  notify_success_issue:
    name: Notificar éxito (Issue)
    runs-on: ubuntu-latest
    needs: [dev, test, prod]
    if: always() && !contains(join(needs.*.result, ','), 'failure')
    steps:
      - name: Crear Issue de éxito
        uses: actions/github-script@v7
        with:
          script: |
            const title = `✅ CI/CD OK (run #${context.runNumber})`;
            const body = [
              `El pipeline Dev → Test → Prod terminó **correctamente**.`,
              ``,
              `**Repo:** ${context.repo.owner}/${context.repo.repo}`,
              `**Workflow:** ${context.workflow}`,
              `**Run:** #${context.runNumber}`,
              `**URL:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `**Resultados por stage:**`,
              `- DEV:  ${{ needs.dev.result }}`,
              `- TEST: ${{ needs.test.result }}`,
              `- PROD: ${{ needs.prod.result }}`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'success']
            });
