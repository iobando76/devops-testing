name: CI/CD Dev → Test → Prod (Simulado)

on:
  workflow_dispatch:
    inputs:
      fail_fase3:
        description: "Simular error en la Fase 3 (en Test)"
        required: true
        default: "false"

jobs:
  dev:
    name: Stage DEV
    runs-on: ubuntu-latest
    steps:
      - name: Fase 1 - Inicialización
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"
          echo "✅ [DEV] Fase 1 completada en ${t}s"

      - name: Fase 2 - Carga de datos
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"
          echo "✅ [DEV] Fase 2 completada en ${t}s"

  test:
    name: Stage TEST
    runs-on: ubuntu-latest
    needs: [dev]
    steps:
      - name: Fase 3 - Procesamiento (con fallo opcional)
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"

          if [ "${{ inputs.fail_fase3 }}" = "true" ]; then
            echo "❌ [TEST] Fase 3 falló intencionalmente (simulación) luego de ${t}s"
            exit 1
          fi

          echo "✅ [TEST] Fase 3 completada en ${t}s"

      - name: Fase 4 - Validación
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"
          echo "✅ [TEST] Fase 4 completada en ${t}s"

  prod:
    name: Stage PROD
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Fase 5 - Deploy / Finalización
        shell: bash
        run: |
          t=$(( (RANDOM % 10) + 1 ))
          sleep "$t"
          echo "✅ [PROD] Fase 5 completada en ${t}s"

  notify_summary:
    name: Notificación (Summary)
    runs-on: ubuntu-latest
    needs: [dev, test, prod]
    if: always()
    steps:
      - name: Escribir resumen
        shell: bash
        run: |
          {
            echo "## Resultado CI/CD Dev → Test → Prod"
            echo ""
            echo "**Repo:** $GITHUB_REPOSITORY"
            echo "**Run:** #$GITHUB_RUN_NUMBER"
            echo "**URL:** https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo ""
            echo "### Resultados por stage"
            echo "- DEV:  ${{ needs.dev.result }}"
            echo "- TEST: ${{ needs.test.result }}"
            echo "- PROD: ${{ needs.prod.result }}"
            echo ""
            if echo "${{ join(needs.*.result, ',') }}" | grep -q "failure"; then
              echo "### Estado"
              echo "❌ Falló"
            else
              echo "### Estado"
              echo "✅ OK"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
